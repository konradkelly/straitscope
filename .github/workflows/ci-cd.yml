name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Look up EC2 instance ID
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=straitscope-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[] | sort_by(@, &LaunchTime)[-1].InstanceId" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running instance tagged Name=straitscope-app found"
            exit 1
          fi
          echo "Deploying to $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

      - name: Write server .env
        run: |
          cat > deploy.env <<EOF
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          AISSTREAM_API_KEY=${{ secrets.AISSTREAM_API_KEY }}
          EOF

      - name: Upload release artifacts to S3
        run: |
          PREFIX="s3://${{ vars.DEPLOY_ARTIFACTS_BUCKET }}/releases/${{ github.sha }}"
          aws s3 cp docker-compose.prod.yml "$PREFIX/docker-compose.prod.yml"
          aws s3 cp sql/schema.sql "$PREFIX/schema.sql"
          aws s3 cp data/incidents.yaml "$PREFIX/incidents.yaml"
          aws s3 sync web/dist "$PREFIX/web-dist/" --delete
          aws s3 cp deploy.env "$PREFIX/deploy.env"

      - name: Deploy via SSM
        run: |
          PREFIX="s3://${{ vars.DEPLOY_ARTIFACTS_BUCKET }}/releases/${{ github.sha }}"
          COMMANDS=$(jq -n --arg prefix "$PREFIX" --arg tag "${{ github.sha }}" \
            --arg token "${{ secrets.GITHUB_TOKEN }}" --arg actor "${{ github.actor }}" '
            [
              "#!/bin/bash",
              "set -euo pipefail",
              "mkdir -p /opt/straitscope/sql /opt/straitscope/data /opt/straitscope/web/dist",
              "cd /opt/straitscope",
              ("aws s3 cp " + $prefix + "/docker-compose.prod.yml docker-compose.prod.yml"),
              ("aws s3 cp " + $prefix + "/schema.sql sql/schema.sql"),
              ("aws s3 cp " + $prefix + "/incidents.yaml data/incidents.yaml"),
              # sync compares size/mtime, and hashed filenames of the same
              # length (e.g. Vite index-XXXXXXXX.js) can look unchanged to
              # that heuristic across builds - clear the dir first so every
              # file is always freshly written.
              "rm -rf web/dist/*",
              ("aws s3 sync " + $prefix + "/web-dist/ web/dist/ --delete"),
              ("aws s3 cp " + $prefix + "/deploy.env .env"),
              ("echo " + ($token | @sh) + " | docker login ghcr.io -u " + $actor + " --password-stdin"),
              ("export IMAGE_TAG=" + $tag),
              "docker compose -f docker-compose.prod.yml pull",
              "docker compose -f docker-compose.prod.yml up -d --remove-orphans",
              "docker image prune -f"
            ]')

          PAYLOAD=$(jq -n --argjson commands "$COMMANDS" '{commands: $commands}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "straitscope deploy ${{ github.sha }}" \
            --parameters "$PAYLOAD" \
            --query "Command.CommandId" --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"

      - name: Wait for SSM deploy to finish
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "attempt $i: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "--- stdout ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text
                echo "--- stderr ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
                echo "::error::SSM command ended with status $STATUS"
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "::error::SSM command did not complete within timeout"
          exit 1

      - name: Smoke-check /healthz
        run: |
          for i in $(seq 1 10); do
            body=$(curl -sS https://straitscope.com/healthz || true)
            echo "attempt $i: $body"
            if echo "$body" | grep -q '"db":"ok"'; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::/healthz never reported a healthy db after deploy"
          exit 1

      - name: Smoke-check frontend assets
        run: |
          # Catches index.html referencing a JS bundle that does not match
          # what actually got deployed (e.g. a stale sync) - Caddy's SPA
          # fallback serves index.html itself for the missing path, so the
          # browser gets HTML where it expected a module script.
          for i in $(seq 1 10); do
            html=$(curl -sS https://straitscope.com/ || true)
            asset=$(echo "$html" | grep -o '/assets/[^"]*\.js' | head -1)
            if [ -n "$asset" ]; then
              ctype=$(curl -sS -o /dev/null -w '%{content_type}' "https://straitscope.com$asset")
              echo "attempt $i: asset=$asset content-type=$ctype"
              case "$ctype" in
                *javascript*) exit 0 ;;
              esac
            else
              echo "attempt $i: no JS asset path found in /"
            fi
            sleep 5
          done
          echo "::error::frontend JS asset did not return a javascript content-type after deploy"
          exit 1
