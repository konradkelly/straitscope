services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: strait
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env}
      POSTGRES_DB: strait
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strait"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ingest:
    build: .
    command: node src/ingest.js
    environment:
      DATABASE_URL: postgres://strait:${DB_PASSWORD}@db:5432/strait
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:?set in .env}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: node src/worker.js
    environment:
      DATABASE_URL: postgres://strait:${DB_PASSWORD}@db:5432/strait
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dbdata:
